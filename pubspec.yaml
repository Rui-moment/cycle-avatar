name: cycle_avatar
description: A smart fitness tracking app with recovery-based avatar growth system
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  # Routing
  go_router: ^14.2.7
  
  # UI Components
  cupertino_icons: ^1.0.2
  
  # Internationalization
  flutter_localizations:
    sdk: flutter
  intl: any
  
  # Fonts
  google_fonts: ^6.2.1
  
  # Simple Storage for data persistence
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # Linting
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  generate: true
  
  assets:
    - assets/fitness_avatar.svg
    - assets/fitness_avatar.png
    - assets/fitness_avatar_64.png
    - assets/fitness_avatar_128.png
