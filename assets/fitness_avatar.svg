  <!-- Mouth -->
  <path d="M190 140 Q200 150 210 140" stroke="#1D1D1F" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Neck -->
  <rect x="185" y="180" width="30" height="25" fill="#E9C2A6" stroke="#1D1D1F" stroke-width="4"/>
  
