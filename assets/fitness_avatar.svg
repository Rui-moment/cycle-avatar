  <!-- Left hand -->
  <circle cx="117" cy="370" r="12" fill="#E9C2A6" stroke="#1D1D1F" stroke-width="4"/>
  
  <!-- Right arm -->
  <rect x="265" y="220" width="25" height="80" rx="12" fill="#E9C2A6" stroke="#1D1D1F" stroke-width="4"/>
  <rect x="270" y="300" width="25" height="60" rx="12" fill="#E9C2A6" stroke="#1D1D1F" stroke-width="4"/>
  <!-- Right hand -->
  <circle cx="283" cy="370" r="12" fill="#E9C2A6" stroke="#1D1D1F" stroke-width="4"/>
  
  <!-- Legs -->
  <rect x="170" y="355" width="25" height="120" rx="12" fill="#2E2E30" stroke="#1D1D1F" stroke-width="4"/>
  <rect x="205" y="355" width="25" height="120" rx="12" fill="#2E2E30" stroke="#1D1D1F" stroke-width="4"/>
  
  <!-- Feet -->
