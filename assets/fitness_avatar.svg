<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="600" viewBox="0 0 400 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Head -->
  <circle cx="200" cy="120" r="60" fill="#E9C2A6" stroke="#1D1D1F" stroke-width="4"/>
  
